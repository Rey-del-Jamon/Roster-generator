<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Roster Manager</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="passcode-screen" class="passcode-overlay">
    <div class="passcode-box">
      <h2>Enter Passcode</h2>
      <input type="password" inputmode="numeric" pattern="[0-9]*" id="passcode-input" placeholder="Passcode" />
      <button id="btn-submit-passcode" class="btn">Unlock</button>
      <p id="passcode-error" class="error" style="display: none;">Incorrect passcode.</p>
    </div>
  </div>

  <div class="container" id="main-app" style="display: none;">
    <header>
      <h1>Roster Manager</h1>
      <p class="subtitle">Manage your duty plan</p>
    </header>

    <div class="card">
      <div class="input-group" style="margin-bottom: 20px; text-align: left; display: flex; gap: 10px;">
        <div style="flex: 1;">
          <label for="custom-date" style="display: block; font-size: 14px; margin-bottom: 5px; color: var(--text-color);">Set UTC Date:</label>
          <input type="date" id="custom-date" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-color); color: var(--text-color); font-family: inherit; font-size: 16px; box-sizing: border-box;">
        </div>
        <div style="flex: 1;">
          <label for="custom-time" style="display: block; font-size: 14px; margin-bottom: 5px; color: var(--text-color);">Set UTC Time:</label>
          <input type="time" id="custom-time" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-color); color: var(--text-color); font-family: inherit; font-size: 16px; box-sizing: border-box;">
        </div>
      </div>

      <button class="action-btn btn-report" id="btn-report">
        <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M2.5,19H21.5V21H2.5V19M22.07,9.64C21.86,8.84 21.03,8.36 20.23,8.58L14.92,10L8,3.57L6.09,4.08L10.23,11.25L5.26,12.58L3.29,11.04L1.84,11.43L3.66,14.59L4.43,15.92L6.03,15.5L11.34,14.07L15.69,12.91L21,11.5C21.81,11.26 22.28,10.44 22.07,9.64Z"></path>
        </svg>
        Check In
      </button>

      <button class="action-btn btn-checkout" id="btn-checkout">
        <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M2.5,19H21.5V21H2.5V19M9.68,13.27L14.03,14.43L19.34,15.85C20.14,16.06 20.96,15.59 21.18,14.79C21.39,14 20.92,13.17 20.12,12.95L14.81,11.53L12.05,2.5L10.12,2V10.28L5.15,8.95L4.22,6.63L2.77,6.24V11.41L4.37,11.84L9.68,13.27Z"></path>
        </svg>
        Check Out
      </button>

      <div id="status">Ready</div>
    </div>
  </div>

  <script src="app.js?v=4"></script>
</body>
</html>
